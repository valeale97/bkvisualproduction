<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>BK Visual Production</title>

  <!-- Redirect (GitHub Pages safe) -->
  <meta http-equiv="refresh" content="0; url=./en/" />

  <!-- Icons -->
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="./assets/favicon.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />

  <!-- SEO -->
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://valeale97.github.io/bkvisualproduction/" />

  <!-- Minimal fallback styling -->
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial;
      background: #07080b;
      color: #e9ecf1;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    a { color: #6ae6ff; text-decoration: none; }
    .card {
      max-width: 36rem;
      padding: 1.25rem;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background: rgba(255,255,255,.04);
    }
  </style>

  <!-- JS redirect (faster than meta, but safe fallback exists) -->
  <script>
    window.location.href = "./en/";
  </script>
</head>

<body>
  <main class="card" role="main">
    <h1 style="margin:0 0 .5rem">BK Visual Production</h1>
    <p style="margin:0 0 1rem;color:rgba(233,236,241,.75)">
      Redirecting to English…
    </p>
    <p style="margin:0">
      If you are not redirected:
      <a href="./en/">English</a> · 
      <a href="./hr/">Hrvatski</a>
    </p>
  </main>

  <!-- Includes -->
  <div data-include="contact"></div>
  <div data-include="footer"></div>

  <!-- Scripts -->
  <script src="https://www.google.com/recaptcha/api.js?onload=BKVP_onRecaptchaLoad&render=explicit" async defer></script>
  <script src="./js/includes.js" defer></script>
</body>
</html>
