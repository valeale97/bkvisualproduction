        <a class="icon" href="tel:+385955984248" aria-label="Telefon" title="Telefon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.6 3.1 3.9 5.4 7 7l2.3-2.3c.3-.3.8-.4 1.2-.3 1.3.4 2.7.6 4.1.6.7 0 1.3.6 1.3 1.3V21c0 .7-.6 1.3-1.3 1.3C10.4 22.3 1.7 13.6 1.7 2.8 1.7 2.1 2.3 1.5 3 1.5H6.7c.7 0 1.3.6 1.3 1.3 0 1.4.2 2.8.6 4.1.1.4 0 .9-.3 1.2L6.6 10.8z"/></svg>

    <form class="form" id="contactForm" data-form="contact" novalidate>
      <div class="grid2">
        <label class="field">
          <span class="field__label">Ime</span>
          <input name="name" autocomplete="given-name" required placeholder="Ime" />
        </label>
        <label class="field">
          <span class="field__label">Prezime</span>
          <input name="surname" autocomplete="family-name" required placeholder="Prezime" />
        </label>
        <label class="field">
          <span class="field__label">Telefon</span>
          <input name="phone" inputmode="tel" autocomplete="tel" placeholder="+385..." required pattern="[0-9+\s-]{6,20}" title="Broj telefona" />
        </label>
        <label class="field">
          <span class="field__label">Email</span>
          <input name="email" type="email" autocomplete="email" required placeholder="email@primjer.com" inputmode="email" />
        </label>
        <label class="field">
          <span class="field__label">Država</span>
          <input name="country" autocomplete="country-name" required placeholder="Država" />
        </label>
        <label class="field">
          <span class="field__label">Kategorija</span>
          <select name="need" required>
            <option value="">Odaberite kategoriju</option>
            <option value="accommodation">Smještaj</option>
            <option value="restaurant">Restoran</option>
            <option value="travel_agency">Putna agencija</option>
            <option value="nightlife">Noćni život</option>
            <option value="sport_event">Sportski događaj</option>
            <option value="wedding">Vjenčanje</option>
            <option value="company_promo">Promotivni materijal za firme</option>
            <option value="other">Ostalo</option>
          </select>
        </label>
      </div>

      <label class="field">
        <span class="field__label">Poruka</span>
        <textarea name="message" rows="5" required placeholder="Recite nam više o vašem projektu…"></textarea>
      </label>

      <div class="form__row">
        <div class="js-recaptcha" data-recaptcha></div>
        <button class="btn btn--primary" type="submit">Pošalji upit</button>
      </div>

      <p id="contactStatus" class="form-status" role="status" aria-live="polite" hidden></p>
      <p class="fineprint">Slanjem poruke se slažete s našom <a href="/hr/privacy.html">Politikom privatnosti</a> i <a href="/hr/cookies.html">Politikom kolačića</a>.</p>
