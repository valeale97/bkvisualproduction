<section class="section section--alt" id="contact">
  <div class="container">
    <header class="section__header">
      <h2>Contact</h2>
      <p class="muted">Submit your inquiry below, and we will respond as soon as possible.</p>
    </header>

    <div class="social" aria-label="Social media">
      <a class="icon" href="https://www.instagram.com/borna_kalanj/" aria-label="Instagram" title="Instagram">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm10 2H7a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3zm-5 4a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm5.2-.9a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2z"/></svg>
      </a>
      <a class="icon" href="https://www.linkedin.com/in/borna-kalanj" aria-label="LinkedIn" title="LinkedIn">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.98 3.5A2.5 2.5 0 1 1 5 8.5a2.5 2.5 0 0 1-.02-5zM3 9h4v12H3V9zm7 0h3.8v1.7h.1c.5-1 1.8-2 3.7-2 4 0 4.7 2.6 4.7 6V21h-4v-5.2c0-1.2 0-2.8-1.7-2.8s-2 1.3-2 2.7V21h-4V9z"/></svg>
      </a>
      <a class="icon" href="https://wa.me/385955984248" aria-label="WhatsApp" title="WhatsApp">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 11.9a8.5 8.5 0 0 1-12.5 7.5L3 21l1.7-4.7A8.5 8.5 0 1 1 20.5 11.9zm-8.5-7a6.5 6.5 0 0 0-5.6 9.7l.2.4-.9 2.4 2.5-.8.4.2a6.5 6.5 0 1 0 3.4-12zm3.8 9.2c-.2.6-1.1 1.1-1.5 1.2-.4.1-.8.1-1.3 0-.3-.1-.7-.2-1.2-.4a10.3 10.3 0 0 1-3.6-3.1c-.4-.5-1-1.3-1-2.3s.5-1.5.7-1.7c.2-.2.4-.3.6-.3h.4c.1 0 .3 0 .4.3l.6 1.4c.1.2.1.3 0 .4l-.2.3c-.1.1-.2.2-.3.4-.1.1-.2.3 0 .5.2.2.7 1.2 1.6 2 .9.8 1.6 1 1.9 1.1.2.1.4.1.5-.1l.6-.7c.2-.2.3-.2.5-.1l1.3.6c.2.1.4.2.4.3 0 .1 0 .6-.2 1.2z"/></svg>
      </a>
      <a class="icon" href="tel:+385955984248" aria-label="Phone" title="Phone">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.6 3.1 3.9 5.4 7 7l2.3-2.3c.3-.3.8-.4 1.2-.3 1.3.4 2.7.6 4.1.6.7 0 1.3.6 1.3 1.3V21c0 .7-.6 1.3-1.3 1.3C10.4 22.3 1.7 13.6 1.7 2.8 1.7 2.1 2.3 1.5 3 1.5H6.7c.7 0 1.3.6 1.3 1.3 0 1.4.2 2.8.6 4.1.1.4 0 .9-.3 1.2L6.6 10.8z"/></svg>
      </a>
    </div>

    <form class="form" id="contactForm" data-form="contact" novalidate>
      <div class="grid2">
        <label class="field">
          <span class="field__label">First Name</span>
          <input name="name" autocomplete="given-name" required placeholder="First name" />
        </label>
        <label class="field">
          <span class="field__label">Last Name</span>
          <input name="surname" autocomplete="family-name" required placeholder="Last name" />
        </label>
        <label class="field">
          <span class="field__label">Phone</span>
          <input name="phone" inputmode="tel" autocomplete="tel" placeholder="+385..." required pattern="[0-9+\s-]{6,20}" title="Phone number" />
        </label>
        <label class="field">
          <span class="field__label">Email</span>
          <input name="email" type="email" autocomplete="email" required placeholder="email@example.com" inputmode="email" />
        </label>
        <label class="field">
          <span class="field__label">Country</span>
          <input name="country" autocomplete="country-name" required placeholder="Country" />
        </label>
        <label class="field">
          <span class="field__label">Category</span>
          <select name="need" required>
            <option value="">Select category</option>
            <option value="accommodation">Accommodation</option>
            <option value="restaurant">Restaurant</option>
            <option value="travel_agency">Travel agency</option>
            <option value="nightlife">Nightlife</option>
            <option value="sport_event">Sporting event</option>
            <option value="wedding">Wedding</option>
            <option value="company_promo">Company promo</option>
            <option value="other">Other</option>
          </select>
        </label>
      </div>

      <label class="field">
        <span class="field__label">Message</span>
        <textarea name="message" rows="5" required placeholder="Tell us more about your project…"></textarea>
      </label>

      <div class="form__row">
        <div class="js-recaptcha" data-recaptcha></div>
        <button class="btn btn--primary" type="submit">Send inquiry</button>
      </div>

      <p id="contactStatus" class="form-status" role="status" aria-live="polite" hidden></p>
      <p class="fineprint">
        By sending a message, you agree to our
        <a href="/hr/privacy.html">Privacy Policy</a> and
        <a href="/hr/cookies.html">Cookie Policy</a>.
      </p>
    </form>
  </div>
</section>
