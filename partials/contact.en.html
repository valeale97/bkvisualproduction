          <form class="form" id="contactForm" data-form="contact" novalidate>
            <div class="grid">
              <label class="field">Name
                <input name="name" autocomplete="given-name" required placeholder="Name" />
              </label>
              <label class="field">Surname
                <input name="surname" autocomplete="family-name" required placeholder="Surname" />
              </label>
              <label class="field">Phone
                <input name="phone" inputmode="tel" placeholder="+385..." pattern="[0-9+\s-]{6,20}" title="Phone number" />
              </label>
              <label class="field">Email
                <input name="email" type="email" autocomplete="email" required placeholder="you@example.com" inputmode="email" />
              </label>
              <label class="field">Country
                <input name="country" autocomplete="country-name" placeholder="Country" />
              </label>
              <label class="field">Category
                <select name="topic" required>
                  <option value="" selected disabled>Select category</option>
                  <option value="accommodation">Accommodation</option>
                  <option value="restaurants">Restaurant</option>
                  <option value="travel_agency">Travel agency</option>
                  <option value="nightlife">Nightlife</option>
                  <option value="sport_event">Sport event</option>
                  <option value="wedding">Wedding</option>
                  <option value="company_promo">Company promo</option>
                  <option value="other">Other</option>
                </select>
              </label>
            </div>

            <label class="field">Message
              <textarea name="message" rows="5" required placeholder="Tell us more about your project…"></textarea>
            </label>

            <div class="form__row">
              <!-- reCAPTCHA v2 placeholder: set RECAPTCHA_SITE_KEY in /js/forms.js -->
              <div class="captcha" data-recaptcha="contact"></div>
              <button class="btn btn--primary" type="submit">Send message</button>
            </div>

            <p id="contactStatus" class="form-status" role="status" aria-live="polite" hidden></p>
            <p class="fineprint">By sending message, you agree to our <a href="/en/privacy.html">Privacy Policy</a> and <a href="/en/cookies.html">Cookie Policy</a>.</p>
          </form>
        </div>
      </div>
    </section>
